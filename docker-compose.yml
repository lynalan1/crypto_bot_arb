services:
  db:
    image: postgres:16
    container_name: crypto_pg
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5438:5432"
    volumes:
      - pg_crypto_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pg_crypto_data: