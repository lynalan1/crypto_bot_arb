services:
  db:
    image: postgres:16
    container_name: crypto_pg
    environment:
      POSTGRES_USER: crypto_user
      POSTGRES_PASSWORD: crypto_pass
      POSTGRES_DB: crypto_bot_db
    ports:
      - "5438:5432"
    volumes:
      - pg_crypto_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pg_crypto_data: